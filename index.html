<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Above &amp; Beyond ABA — Event Attendee Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&family=Libre+Caslon+Text:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--vanilla:#FBF6EE;--biscuit:#EFE2CC;--parchment:#F4EADA;--sungold:#F2A63B;--sunset:#E5772E;--clay:#B9491F;
--sky:#8FC0DE;--lagoon:#2E7C8B;--midnight:#1B2A44;--ink:#2b2419;--muted:#7c7060;--line:#E4D6C0;--greenbg:#e3f0f0;--graybg:#efe6d6;}
*{box-sizing:border-box}
body{margin:0;background:var(--vanilla);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;}
.wrap{max-width:1180px;margin:0 auto;padding:28px 22px 90px;}
.kicker{letter-spacing:.22em;text-transform:uppercase;font-size:12px;color:var(--clay);font-weight:600;margin-bottom:6px;}
.tm{font-family:'Libre Caslon Text',serif;font-style:italic;color:var(--sunset);text-transform:none;letter-spacing:0;}
h1{font-family:'Libre Caslon Display',Georgia,serif;font-weight:400;font-size:clamp(30px,4.4vw,50px);line-height:1.03;margin:0 0 6px;color:var(--midnight);}
.sub{color:var(--muted);margin-bottom:6px;}.sub b{color:var(--ink);}
.status{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:999px;margin:6px 0 12px;}
.status .d{width:8px;height:8px;border-radius:50%;}
.status.live{background:var(--greenbg);color:var(--lagoon);}.status.live .d{background:var(--lagoon);}
.status.snap{background:var(--graybg);color:#8a7a5f;}.status.snap .d{background:#b9a377;}
.status.loading{background:#eef4f7;color:#4a6b78;}.status.loading .d{background:#4a6b78;animation:pulse 1s infinite;}
@keyframes pulse{50%{opacity:.3;}}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 22px;border-bottom:2px solid var(--line);}
.tab{border:none;background:none;padding:12px 20px 14px;font:inherit;font-weight:700;font-size:16px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;gap:9px;align-items:center;}
.tab .dot{width:9px;height:9px;border-radius:50%;background:var(--biscuit);}
.tab.on{color:var(--midnight);border-bottom-color:var(--sunset);}.tab.on .dot{background:var(--sunset);}
.tab .mini{font-weight:600;font-size:12.5px;color:var(--muted);}
.venue{font-family:'Libre Caslon Text',serif;font-size:17px;color:var(--lagoon);margin:-6px 0 16px;}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(146px,1fr));gap:13px;margin:6px 0 24px;}
.tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px;}
.tile .n{font-family:'Libre Caslon Display',serif;font-size:34px;line-height:1;color:var(--midnight);}
.tile .l{font-size:12px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.tile .s{font-size:12px;color:var(--clay);margin-top:3px;font-weight:600;}
.tile.deep{background:var(--midnight);border:none;}.tile.deep .n{color:#fff;}.tile.deep .l{color:#b9c4d6;}
.tile.accent{background:linear-gradient(150deg,var(--sungold),var(--sunset));border:none;}.tile.accent .n,.tile.accent .l{color:#fff;}.tile.accent .s{color:#fff2e2;}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;}
.search{flex:1;min-width:200px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;font:inherit;color:var(--ink);}
.search:focus{outline:none;border-color:var(--sunset);box-shadow:0 0 0 3px rgba(229,119,46,.15);}
.seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.seg button{border:none;background:none;padding:10px 15px;font:inherit;font-weight:600;font-size:13.5px;color:var(--muted);cursor:pointer;}
.seg button.on{background:var(--midnight);color:#fff;}
.dl{border:none;background:var(--lagoon);color:#fff;font:inherit;font-weight:700;font-size:13.5px;padding:11px 16px;border-radius:12px;cursor:pointer;}
.dl.alt{background:var(--clay);}.dl:hover{filter:brightness(1.06);}
.fam{background:#fff;border:1px solid var(--line);border-radius:16px;margin-bottom:13px;overflow:hidden;}
.fhead{display:flex;flex-wrap:wrap;align-items:center;gap:11px;padding:15px 20px;cursor:pointer;}.fhead:hover{background:#fffaf1;}
.fname{font-family:'Libre Caslon Text',serif;font-weight:700;font-size:19px;color:var(--midnight);}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.03em;text-transform:uppercase;}
.b-conf{background:var(--greenbg);color:var(--lagoon);}.b-pend{background:var(--graybg);color:#8a7a5f;}
.b-src{background:#eef4f7;color:#4a6b78;}.b-form{background:#fbeede;color:var(--clay);}
.dxchip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.03em;text-transform:uppercase;background:#e7f0ef;color:var(--lagoon);white-space:nowrap;}
.newchip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;letter-spacing:.03em;text-transform:uppercase;background:var(--sungold);color:#5a3410;white-space:nowrap;}
.kidsum{flex-basis:100%;margin-top:6px;font-size:12.5px;color:var(--muted);}
.kidsum b{color:var(--ink);}.kidsum .dxk{color:var(--lagoon);font-weight:700;}
tr.dxrow td{background:#eef6f5;}
.count{margin-left:auto;display:flex;align-items:center;gap:7px;font-weight:600;color:var(--clay);}
.count .big{font-family:'Libre Caslon Display',serif;font-size:25px;color:var(--sunset);}
.meta{width:100%;color:var(--muted);font-size:13px;margin-top:3px;display:flex;gap:16px;flex-wrap:wrap;}.meta a{color:var(--lagoon);text-decoration:none;}
.chev{transition:transform .2s;color:var(--muted);font-size:12px;}.fam.open .chev{transform:rotate(90deg);}
.kids{display:none;padding:2px 14px 15px;}.fam.open .kids{display:block;}
.ktable{width:100%;border-collapse:collapse;font-size:13px;}
.ktable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;padding:8px 9px;border-bottom:2px solid var(--line);white-space:nowrap;}
.ktable td{padding:9px 9px;border-bottom:1px solid #f0e7d7;vertical-align:top;}.ktable tr:last-child td{border-bottom:none;}
.kname{font-weight:700;color:var(--midnight);}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap;}
.p-yes{background:#e3f0e6;color:#2f7d4f;}.p-no{background:#f2ece0;color:#8a7a5f;}.p-mid{background:#fdeede;color:var(--clay);}
.gain{color:#5a5041;max-width:320px;}.hc-yes{color:var(--sunset);font-weight:700;}.hc-no{color:#b3a892;}
.empty{padding:13px 9px;color:var(--muted);font-style:italic;}
.note{background:var(--parchment);border:1px dashed var(--biscuit);border-radius:14px;padding:15px 18px;margin-top:24px;font-size:13.5px;color:#5a5041;}.note b{color:var(--clay);}
.foot{margin-top:26px;color:var(--muted);font-size:12px;text-align:center;}
.hidden{display:none!important;}
@media(max-width:640px){.count{margin-left:0;}}
</style></head><body><div class="wrap">

function pill(v,mode){const t=(v||'').trim();if(!t||t==='Na'||t==='N/A'||t.toLowerCase()==='none')return '<span class="pill p-no">—</span>';
 const l=t.toLowerCase();if(mode==='look'){if(l==='yes')return '<span class="pill p-yes">Yes</span>';if(l==='no')return '<span class="pill p-no">No</span>';return '<span class="pill p-mid">'+esc(t)+'</span>';}
 if(l.startsWith('yes'))return '<span class="pill p-yes">'+esc(t)+'</span>';if(l.startsWith('no'))return '<span class="pill p-no">'+esc(t)+'</span>';return '<span class="pill p-mid">'+esc(t)+'</span>';}
function tiles(e){const s=mm(e.families);const t=[];t.push(['deep',s.families,'Families','']);t.push(['deep',s.attendees,'Total guests','']);
 if(e.hasConfirm)t.push(['accent',s.confirmed,'Confirmed',(s.families-s.confirmed)+' awaiting']);
 t.push(['',s.dx,'Autism diagnosis','children (Yes)']);t.push(['',s.ly+s.le,'Interested in ABA',s.ly+' yes · '+s.le+' exploring']);t.push(['',s.hc,'Haircuts requested','']);
 return t.map(x=>'<div class="tile '+x[0]+'"><div class="n">'+x[1]+'</div><div class="l">'+x[2]+'</div>'+(x[3]?'<div class="s">'+x[3]+'</div>':'')+'</div>').join('');}
function segButtons(e){const opts=e.hasConfirm?[['all','All'],['conf','Confirmed'],['pend','Not confirmed'],['new','🆕 New']]:[['all','All'],['Eventbrite','Eventbrite'],['Microsoft Form','Form'],['new','🆕 New']];
 return opts.map((o,i)=>'<button data-f="'+o[0]+'"'+(i===0?' class="on"':'')+'>'+o[1]+'</button>').join('');}
function daysSince(d){if(!d)return 9999;const t=new Date(new Date().toDateString());const p=new Date(d+'T00:00:00');const n=Math.round((t-p)/86400000);return isNaN(n)?9999:n;}
function hasDx(a){return (a.dx||'').toLowerCase().startsWith('yes');}
function dxCount(f){return (f.attendees||[]).filter(hasDx).length;}
// One-line, always-visible summary of the kids in a family + who has a diagnosis.
function kidSummary(f){const ks=f.attendees||[];if(!ks.length)return '';
 const parts=ks.map(a=>{const nm=esc(a.child||'—');const age=a.age?' ('+esc(a.age)+')':'';return hasDx(a)?'<span class="dxk">🧩 '+nm+age+'</span>':nm+age;});
 const dx=dxCount(f);
 return '<div class="kidsum"><b>Kids ('+ks.length+'):</b> '+parts.join(' · ')+(dx?' — <b>'+dx+'</b> with autism dx':'')+'</div>';}
function kids(f){const any=f.attendees.some(a=>a.child||a.dx||a.gain||a.aba);if(!any)return '<div class="empty">No custom-question answers on file for this registration.</div>';
 const rows=f.attendees.map(a=>{const hc=(a.haircut||'').toLowerCase()==='yes'?'<span class="hc-yes">✂ Yes</span>':((a.haircut||'').toLowerCase()==='no'?'<span class="hc-no">No</span>':'<span class="hc-no">—</span>');
  return '<tr'+(hasDx(a)?' class="dxrow"':'')+'><td class="kname">'+esc(a.child||'—')+'</td><td>'+esc(a.age||'—')+'</td><td>'+pill(a.dx)+'</td><td>'+pill(a.aba)+'</td><td>'+pill(a.looking,'look')+'</td><td class="gain">'+esc(a.gain||'—')+'</td><td>'+hc+'</td></tr>';}).join('');
 return '<table class="ktable"><thead><tr><th>Child</th><th>Age</th><th>Autism dx?</th><th>On ABA?</th><th>Seeking ABA?</th><th>What they want from the day</th><th>Haircut</th></tr></thead><tbody>'+rows+'</tbody></table>';}
function card(f,i,e){let badge;if(e.hasConfirm)badge=f.confirmed?'<span class="badge b-conf">✓ Confirmed</span>':'<span class="badge b-pend">Not confirmed</span>';
 else badge='<span class="badge '+(f.source==='Microsoft Form'?'b-form':'b-src')+'">'+esc(f.source||'Eventbrite')+'</span>';
 const phone=f.phone?'<span>📞 '+esc(f.phone)+'</span>':'';const slot=f.timeslot?'<span>🕐 '+esc(f.timeslot)+'</span>':'';
 const dxc=dxCount(f);const dxchip=dxc?'<span class="dxchip">🧩 '+dxc+' dx</span>':'';
 const ds=daysSince(f.date);const newchip=ds<=3?'<span class="newchip">🆕 '+(ds<=0?'Today':(ds===1?'Yesterday':ds+'d ago'))+'</span>':'';
 return '<div class="fam" data-i="'+i+'"><div class="fhead" onclick="this.parentNode.classList.toggle(\'open\')"><span class="chev">▶</span><span class="fname">'+esc(f.purchaser||'(no name)')+'</span>'+badge+newchip+dxchip+
  '<span class="count"><span class="big">'+f.count+'</span> '+(f.count===1?'guest':'guests')+'</span><div class="meta"><span>✉ <a href="mailto:'+esc(f.email)+'">'+esc(f.email)+'</a></span>'+phone+slot+'<span>'+esc(f.order||'')+' · '+esc(f.date||'')+'</span></div>'+kidSummary(f)+'</div><div class="kids">'+kids(f)+'</div></div>';}
const listEl=document.getElementById('list');
function buildHeader(){const combined=mm(EV[0].families.concat(EV[1].families));
 document.getElementById('sub').innerHTML='Two North Carolina events on one view — <b>'+combined.families+' families</b>, <b>'+combined.attendees+' guests</b> across Charlotte &amp; Cary. Switch events with the tabs below.';
 document.getElementById('tabs').innerHTML=EV.map((e,i)=>{const s=mm(e.families);return '<button class="tab'+(i===cur?' on':'')+'" data-i="'+i+'"><span class="dot"></span>'+esc(e.name)+' <span class="mini">'+s.families+' fam · '+s.attendees+' guests</span></button>';}).join('');}
function renderEvent(){const e=EV[cur];document.getElementById('venue').textContent=e.venue;document.getElementById('tiles').innerHTML=tiles(e);
 document.getElementById('seg').innerHTML=segButtons(e);document.getElementById('q').value=query='';filter='all';
 listEl.innerHTML=e.families.map((f,i)=>card(f,i,e)).join('');apply();}
function apply(){const e=EV[cur];document.querySelectorAll('.fam').forEach(el=>{const f=e.families[+el.dataset.i];let ok=true;
 if(filter==='conf'&&!f.confirmed)ok=false;if(filter==='pend'&&f.confirmed)ok=false;
 if(filter==='Eventbrite'&&f.source!=='Eventbrite')ok=false;if(filter==='Microsoft Form'&&f.source!=='Microsoft Form')ok=false;
 if(filter==='new'&&daysSince(f.date)>3)ok=false;
 if(ok&&query){const hay=(f.purchaser+' '+f.email+' '+f.phone+' '+f.attendees.map(a=>a.child+' '+a.gain).join(' ')).toLowerCase();ok=hay.includes(query);}
 el.classList.toggle('hidden',!ok);});}
function draw(){buildHeader();renderEvent();}
document.getElementById('tabs').addEventListener('click',ev=>{const b=ev.target.closest('.tab');if(!b)return;cur=+b.dataset.i;
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));b.classList.add('on');renderEvent();});
document.getElementById('seg').addEventListener('click',ev=>{if(ev.target.tagName!=='BUTTON')return;[...ev.currentTarget.children].forEach(x=>x.classList.remove('on'));ev.target.classList.add('on');filter=ev.target.dataset.f;apply();});
document.getElementById('q').addEventListener('input',ev=>{query=ev.target.value.toLowerCase();apply();});
function csv(rows){return rows.map(r=>r.map(c=>{c=(c==null?'':String(c));return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');}
function dl(name,rows){const blob=new Blob([csv(rows)],{type:'text/csv'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}
document.getElementById('dlEvent').addEventListener('click',()=>{const e=EV[cur];const seen=new Set();const out=[['Event','Family / Parent','Email','Phone','Guests','Confirmed']];
 for(const f of e.families){const k=(f.email||'').toLowerCase();if(!f.email||seen.has(k))continue;seen.add(k);out.push([e.name,f.purchaser,f.email,f.phone,f.count,f.confirmed==null?'':(f.confirmed?'Yes':'No')]);}dl('emails_'+e.name.toLowerCase()+'.csv',out);});
document.getElementById('dlAll').addEventListener('click',()=>{let rows=[['Event','Family / Parent','Email','Phone','Guests','Confirmed']];const seen=new Set();
 for(const e of EV)for(const f of e.families){const k=(f.email||'').toLowerCase();if(!f.email||seen.has(k))continue;seen.add(k);rows.push([e.name,f.purchaser,f.email,f.phone,f.count,f.confirmed==null?'':(f.confirmed?'Yes':'No')]);}dl('emails_all_events.csv',rows);});
function emailFamilies(onlyPending){const e=EV[cur];const seen=new Set();const emails=[];
 for(const f of e.families){if(onlyPending&&f.confirmed)continue;const k=(f.email||'').toLowerCase();if(!f.email||seen.has(k))continue;seen.add(k);emails.push(f.email);}
 if(!emails.length){alert(onlyPending?('Everyone in '+e.name+' is already confirmed — no reminders needed. 🎉'):('No email addresses found for '+e.name+'.'));return;}
 const list=emails.join(';');
 const subject=encodeURIComponent(e.name+' Event — Friendly Reminder');
 const body=encodeURIComponent('Hi there,\n\nThis is a friendly reminder about our upcoming '+e.name+' event. We can’t wait to see you and your family there!\n\nWarm regards,\nAbove & Beyond ABA');
 if(navigator.clipboard)navigator.clipboard.writeText(list).catch(()=>{});
 const href='mailto:?bcc='+encodeURIComponent(list)+'&subject='+subject+'&body='+body;
 alert(emails.length+' '+(onlyPending?'not-confirmed ':'')+e.name+' families added to BCC. (Also copied to your clipboard as backup — if the BCC line is empty, just paste into it.)');
 window.location.href=href;}
document.getElementById('emailPending').addEventListener('click',()=>emailFamilies(true));
document.getElementById('emailAll').addEventListener('click',()=>emailFamilies(false));
document.getElementById('note').innerHTML='<b>Good to know:</b> “Interested in ABA” combines families who answered <b>Yes</b> with those <b>exploring options</b> — your warmest post-event leads. Cary registrations arrive through two channels (Eventbrite + the Microsoft Form), tagged on each family. Use the <b>email download</b> buttons for post-event outreach.';
function setStatus(cls,txt){const s=document.getElementById('status');s.className='status '+cls;document.getElementById('statusText').textContent=txt;}
draw();
// Try live Eventbrite data; fall back silently to the embedded snapshot.
fetch('/api/attendees?ts='+Date.now(),{cache:'no-store'}).then(r=>r.json()).then(d=>{
 if(d&&d.events&&d.events.length&&d.events.some(e=>e.families&&e.families.length)){DB=d;EV=DB.events;cur=Math.min(cur,EV.length-1);draw();}
 const m=d&&d._meta;
 if(m&&m.live){const now=new Date();setStatus('live','● Live from Eventbrite · updated '+now.toLocaleString());}
 else{setStatus('snap','Showing saved snapshot'+(m&&m.message?' — '+m.message:''));}
}).catch(()=>{setStatus('snap','Showing saved snapshot (could not reach Eventbrite)');});
</script></body></html>
